services:
  - type: web
    name: clifford-bone-chase
    runtime: static
    buildCommand: mkdir -p dist && cp index.html style.css script.js dist/ && if [ -f _redirects ]; then cp _redirects dist/_redirects; fi
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
